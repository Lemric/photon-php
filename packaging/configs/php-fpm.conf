;;;;;;;;;;;;;;;;;;;;;
; FPM Configuration ;
;;;;;;;;;;;;;;;;;;;;;

[global]
pid = /run/php85-fpm/php-fpm.pid
error_log = /var/log/php85-fpm/error.log
log_level = notice
daemonize = no
emergency_restart_threshold = 10
emergency_restart_interval = 1m
process_control_timeout = 10s

include = /etc/php85/php-fpm.d/*.conf
