name: Publish package repository

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version to build'
        required: false
        default: '8.5.8'

concurrency:
  group: publish-packages
  cancel-in-progress: false

permissions:
  contents: write

env:
  PHP_VERSION: ${{ github.event.inputs.php_version || '8.5.8' }}
  PHOTON_VERSION: '5.0'
  REPO_BASEURL: https://pkgs.photon.lemric.com
  PUBLISH_BRANCH: gh-pages

jobs:
  build:
    name: Build RPMs (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all RPMs
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e PHP_VERSION="${{ env.PHP_VERSION }}" \
            -e ARCH="${{ matrix.arch }}" \
            -e OUTPUT_DIR="/build/repo/${{ matrix.arch }}" \
            -e RPMBUILD_DIR="/build/.rpmbuild-${{ matrix.arch }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              chmod +x scripts/*.sh && \
              scripts/install-build-deps.sh && \
              scripts/build-rpm.sh all
            "

      - name: Create repository metadata
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e ARCH="${{ matrix.arch }}" \
            -e REPO_BASEURL="${{ env.REPO_BASEURL }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              tdnf install -y createrepo_c && \
              ARCH=${{ matrix.arch }} REPO_BASEURL=${{ env.REPO_BASEURL }} scripts/build-repo.sh
            "

      - name: Upload architecture artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-${{ matrix.arch }}
          path: repo/${{ matrix.arch }}/
          retention-days: 7

  publish:
    name: Publish to gh-pages branch
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source (templates only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            pages
          sparse-checkout-cone-mode: false

      - name: Download architecture artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble package repository
        run: |
          set -euo pipefail
          mkdir -p publish/x86_64 publish/aarch64

          cp -a artifacts/repo-x86_64/. publish/x86_64/
          cp -a artifacts/repo-aarch64/. publish/aarch64/

          test -d publish/x86_64/repodata
          test -d publish/aarch64/repodata
          ls publish/x86_64/*.rpm >/dev/null
          ls publish/aarch64/*.rpm >/dev/null

          cp pages/CNAME publish/CNAME
          cp pages/.nojekyll publish/.nojekyll
          cp pages/photon-php.repo publish/photon-php.repo
          cp pages/index.html publish/index.html
          cp pages/BRANCH-README.md publish/README.md
          sed -i "s/@PHP_VERSION@/${{ env.PHP_VERSION }}/g" publish/index.html
          sed -i "s|@GITHUB_REPOSITORY@|${{ github.repository }}|g" publish/index.html

          cat > publish/repodata.json << EOF
          {
            "name": "photon-php",
            "baseurl": "${{ env.REPO_BASEURL }}",
            "php_version": "${{ env.PHP_VERSION }}",
            "architectures": ["x86_64", "aarch64"],
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}"
          }
          EOF

          echo "Package repository contents:"
          find publish -maxdepth 2 -type d

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ env.PUBLISH_BRANCH }}
          publish_dir: ./publish
          cname: pkgs.photon.lemric.com
          force_orphan: true
          commit_message: 'publish: PHP ${{ env.PHP_VERSION }} (${{ github.sha }})'
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
