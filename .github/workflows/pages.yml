name: Publish package repository (GitHub Pages)

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version to build'
        required: false
        default: '8.5.8'

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PHP_VERSION: ${{ github.event.inputs.php_version || '8.5.8' }}
  PHOTON_VERSION: '5.0'
  REPO_BASEURL: https://pkgs.photon.lemric.com

jobs:
  build:
    name: Build RPMs (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all RPMs
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e PHP_VERSION="${{ env.PHP_VERSION }}" \
            -e ARCH="${{ matrix.arch }}" \
            -e OUTPUT_DIR="/build/repo/${{ matrix.arch }}" \
            -e RPMBUILD_DIR="/build/.rpmbuild-${{ matrix.arch }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              chmod +x scripts/*.sh && \
              scripts/install-build-deps.sh && \
              scripts/build-rpm.sh all
            "

      - name: Create repository metadata
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e ARCH="${{ matrix.arch }}" \
            -e REPO_BASEURL="${{ env.REPO_BASEURL }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              tdnf install -y createrepo_c && \
              ARCH=${{ matrix.arch }} REPO_BASEURL=${{ env.REPO_BASEURL }} scripts/build-repo.sh
            "

      - name: Upload architecture artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-${{ matrix.arch }}
          path: repo/${{ matrix.arch }}/
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: https://pkgs.photon.lemric.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download architecture artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site/x86_64 _site/aarch64

          cp -a artifacts/repo-x86_64/. _site/x86_64/
          cp -a artifacts/repo-aarch64/. _site/aarch64/

          test -d _site/x86_64/repodata
          test -d _site/aarch64/repodata
          ls _site/x86_64/*.rpm >/dev/null
          ls _site/aarch64/*.rpm >/dev/null

          cp pages/CNAME _site/CNAME
          cp pages/.nojekyll _site/.nojekyll
          cp pages/photon-php.repo _site/photon-php.repo
          cp pages/index.html _site/index.html
          sed -i "s/@PHP_VERSION@/${{ env.PHP_VERSION }}/g" _site/index.html
          sed -i "s|@GITHUB_REPOSITORY@|${{ github.repository }}|g" _site/index.html

          cat > _site/repodata.json << EOF
          {
            "name": "photon-php",
            "baseurl": "${{ env.REPO_BASEURL }}",
            "php_version": "${{ env.PHP_VERSION }}",
            "architectures": ["x86_64", "aarch64"],
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
