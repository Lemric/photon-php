name: Build PHP 8.5 RPMs

on:
  push:
    branches: [main, master]
    paths:
      - 'packaging/**'
      - 'scripts/**'
      - 'docker/Dockerfile.builder'
      - '.github/workflows/build-php85.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'packaging/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version to build'
        required: false
        default: '8.5.8'

env:
  PHP_VERSION: ${{ github.event.inputs.php_version || '8.5.8' }}
  PHOTON_VERSION: '5.0'

jobs:
  build:
    name: Build PHP RPMs (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build RPMs in Photon container
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e PHP_VERSION="${{ env.PHP_VERSION }}" \
            -e ARCH="${{ matrix.arch }}" \
            -e OUTPUT_DIR="/build/repo/${{ matrix.arch }}" \
            -e RPMBUILD_DIR="/build/.rpmbuild-${{ matrix.arch }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              chmod +x scripts/*.sh && \
              scripts/install-build-deps.sh && \
              scripts/build-rpm.sh re2c && \
              scripts/build-rpm.sh php
            "

      - name: Create repository metadata
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e ARCH="${{ matrix.arch }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              tdnf install -y createrepo_c && \
              ARCH=${{ matrix.arch }} scripts/build-repo.sh
            "

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: php85-rpms-${{ matrix.arch }}
          path: |
            repo/${{ matrix.arch }}/*.rpm
            repo/${{ matrix.arch }}/repodata/
          retention-days: 30

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: php85-repo-${{ matrix.arch }}
          path: repo/${{ matrix.arch }}/
          retention-days: 30
