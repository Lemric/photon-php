name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version to build'
        required: false
        default: '8.5.8'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  PHP_VERSION: ${{ github.event.inputs.php_version || '8.5.8' }}
  PHOTON_VERSION: '5.0'
  REPO_BASEURL: https://pkgs.photon.lemric.com
  PUBLISH_BRANCH: gh-pages

jobs:
  build-rpms:
    name: 'RPMs ${{ matrix.arch }} (native)'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runners — no QEMU emulation (10-20x faster for aarch64).
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build RPMs (re2c → libzip → rabbitmq-c → php85 → PECL)
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e PHP_VERSION="${{ env.PHP_VERSION }}" \
            -e ARCH="${{ matrix.arch }}" \
            -e OUTPUT_DIR="/build/repo/${{ matrix.arch }}" \
            -e RPMBUILD_DIR="/build/.rpmbuild-${{ matrix.arch }}" \
            -e REPO_BASEURL="${{ env.REPO_BASEURL }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c 'chmod +x scripts/*.sh && scripts/ci-build.sh'

      - name: Upload RPM repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-${{ matrix.arch }}
          path: repo/${{ matrix.arch }}/
          retention-days: 7

  test-install:
    name: Test install (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: build-rpms
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Download repository artifact
        uses: actions/download-artifact@v4
        with:
          name: repo-${{ matrix.arch }}
          path: repo/${{ matrix.arch }}

      - name: Test installation and functionality
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}/repo/${{ matrix.arch }}:/repo:ro" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              set -euo pipefail

              rpm -Uvh --replacepkgs /repo/libzip-[0-9]*.rpm /repo/rabbitmq-c-[0-9]*.rpm
              rpm -Uvh --replacepkgs \
                /repo/php85-common-*.rpm /repo/php85-cli-*.rpm /repo/php85-fpm-*.rpm \
                /repo/php85-opcache-*.rpm /repo/php85-mbstring-*.rpm /repo/php85-intl-*.rpm \
                /repo/php85-xml-*.rpm /repo/php85-curl-*.rpm /repo/php85-gd-*.rpm \
                /repo/php85-zip-*.rpm /repo/php85-bcmath-*.rpm /repo/php85-mysqlnd-*.rpm \
                /repo/php85-pgsql-*.rpm /repo/php85-8*.rpm \
                /repo/php85-pecl-redis-*.rpm /repo/php85-pecl-igbinary-*.rpm 2>/dev/null \
              || {
                # rpm needs runtime deps from Photon repos; resolve via tdnf localinstall
                tdnf install -y /repo/libzip-[0-9]*.rpm /repo/rabbitmq-c-[0-9]*.rpm \
                  /repo/php85-common-*.rpm /repo/php85-cli-*.rpm /repo/php85-fpm-*.rpm \
                  /repo/php85-opcache-*.rpm /repo/php85-mbstring-*.rpm /repo/php85-intl-*.rpm \
                  /repo/php85-xml-*.rpm /repo/php85-curl-*.rpm /repo/php85-gd-*.rpm \
                  /repo/php85-zip-*.rpm /repo/php85-bcmath-*.rpm /repo/php85-mysqlnd-*.rpm \
                  /repo/php85-pgsql-*.rpm /repo/php85-8*.rpm \
                  /repo/php85-pecl-redis-*.rpm /repo/php85-pecl-igbinary-*.rpm
              }

              php -v | grep -E 'PHP 8\.5\.[0-9]+'
              php -m | grep -E '^(mbstring|intl|curl|gd|zip|bcmath|mysqli|pdo_mysql|pgsql|pdo_pgsql)$'
              php -m | grep -E '^(redis|igbinary)$'
              php-fpm -t
              id php-fpm
              echo 'All tests passed'
            "

  docker-image:
    name: Docker PHP 8.5 (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: build-rpms
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download repository artifact
        uses: actions/download-artifact@v4
        with:
          name: repo-${{ matrix.arch }}
          path: docker/8.5/photon/rpm/repo

      - name: Build image from RPMs
        run: |
          docker build \
            --platform ${{ matrix.platform }} \
            --build-arg PHOTON_VERSION=${{ env.PHOTON_VERSION }} \
            -f docker/8.5/photon/rpm/Dockerfile \
            -t php:${{ env.PHP_VERSION }}-photon-${{ matrix.arch }} \
            docker/8.5/photon/rpm

      - name: Smoke-test image
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            php:${{ env.PHP_VERSION }}-photon-${{ matrix.arch }} php -v
          docker run --rm --platform ${{ matrix.platform }} \
            php:${{ env.PHP_VERSION }}-photon-${{ matrix.arch }} php -m

      - name: Push image to GHCR (master only)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          IMAGE="ghcr.io/${{ github.repository_owner }}/php85-photon"
          IMAGE="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"
          docker tag php:${{ env.PHP_VERSION }}-photon-${{ matrix.arch }} \
            "$IMAGE:${{ env.PHP_VERSION }}-${{ matrix.arch }}"
          docker push "$IMAGE:${{ env.PHP_VERSION }}-${{ matrix.arch }}"

  docker-manifest:
    name: Multi-arch manifest
    runs-on: ubuntu-latest
    needs: docker-image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Create and push manifest
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          IMAGE="ghcr.io/${{ github.repository_owner }}/php85-photon"
          IMAGE="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"
          docker manifest create "$IMAGE:${{ env.PHP_VERSION }}" \
            "$IMAGE:${{ env.PHP_VERSION }}-x86_64" \
            "$IMAGE:${{ env.PHP_VERSION }}-aarch64"
          docker manifest push "$IMAGE:${{ env.PHP_VERSION }}"
          docker manifest create "$IMAGE:latest" \
            "$IMAGE:${{ env.PHP_VERSION }}-x86_64" \
            "$IMAGE:${{ env.PHP_VERSION }}-aarch64"
          docker manifest push "$IMAGE:latest"

  publish:
    name: Publish to gh-pages
    runs-on: ubuntu-latest
    needs: [build-rpms, test-install]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout pages templates
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            pages
          sparse-checkout-cone-mode: false

      - name: Download repository artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble package repository
        run: |
          set -euo pipefail
          mkdir -p publish/x86_64 publish/aarch64

          cp -a artifacts/repo-x86_64/. publish/x86_64/
          cp -a artifacts/repo-aarch64/. publish/aarch64/

          test -d publish/x86_64/repodata
          test -d publish/aarch64/repodata
          ls publish/x86_64/*.rpm >/dev/null
          ls publish/aarch64/*.rpm >/dev/null

          cp pages/CNAME publish/CNAME
          cp pages/.nojekyll publish/.nojekyll
          cp pages/photon-php.repo publish/photon-php.repo
          cp pages/index.html publish/index.html
          cp pages/BRANCH-README.md publish/README.md
          sed -i "s/@PHP_VERSION@/${{ env.PHP_VERSION }}/g" publish/index.html
          sed -i "s|@GITHUB_REPOSITORY@|${{ github.repository }}|g" publish/index.html

          cat > publish/repodata.json << EOF
          {
            "name": "photon-php",
            "baseurl": "${{ env.REPO_BASEURL }}",
            "php_version": "${{ env.PHP_VERSION }}",
            "architectures": ["x86_64", "aarch64"],
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}"
          }
          EOF

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ env.PUBLISH_BRANCH }}
          publish_dir: ./publish
          cname: pkgs.photon.lemric.com
          force_orphan: true
          commit_message: 'publish: PHP ${{ env.PHP_VERSION }} (${{ github.sha }})'
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
