name: Build Photon Bootstrap

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild all bootstrap packages'
        required: false
        type: boolean
        default: false

concurrency:
  group: build-bootstrap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PHP_VERSION: '8.5.8'
  PHOTON_VERSION: '5.0'
  REPO_BASEURL: https://pkgs.photon.lemric.com
  PUBLISH_BRANCH: gh-pages

jobs:
  build-bootstrap:
    name: 'Bootstrap ${{ matrix.arch }} (native)'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout published RPMs
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_BRANCH }}
          path: published
          sparse-checkout: |
            x86_64
            aarch64
            repodata.json
          sparse-checkout-cone-mode: false
        continue-on-error: true

      - name: Build changed bootstrap packages
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHP_VERSION: ${{ env.PHP_VERSION }}
          REPO_BASEURL: ${{ env.REPO_BASEURL }}
          PUBLISH_BRANCH: ${{ env.PUBLISH_BRANCH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          CI_FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_build || '0' }}
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh

          mapfile -t stages < <(scripts/ci-changed-stages.sh bootstrap "${{ matrix.arch }}" published)
          if [ "${#stages[@]}" -eq 0 ]; then
            echo "No bootstrap packages need rebuilding for ${{ matrix.arch }}"
            echo "has_artifacts=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          publish_if_main() {
            local stage="$1"
            if [ "${{ github.event_name }}" = push ] \
              && { [ "${{ github.ref }}" = refs/heads/main ] || [ "${{ github.ref }}" = refs/heads/master ]; }; then
              scripts/ci-publish-rpms.sh "${{ matrix.arch }}" "repo/${{ matrix.arch }}" --rpms-only "${stage}"
            fi
          }

          for stage in "${stages[@]}"; do
            echo "=== Building bootstrap stage: ${stage} ==="
            docker run --privileged --rm \
              --platform ${{ matrix.platform }} \
              -v "${{ github.workspace }}:/build" \
              -w /build \
              -e ARCH="${{ matrix.arch }}" \
              -e OUTPUT_DIR="/build/repo/${{ matrix.arch }}" \
              -e RPMBUILD_DIR="/build/.rpmbuild-${{ matrix.arch }}" \
              -e REPO_BASEURL="${{ env.REPO_BASEURL }}" \
              photon:${{ env.PHOTON_VERSION }} \
              bash -c "scripts/ci-build-bootstrap.sh ${stage}"

            publish_if_main "${stage}"
          done

          if ls "repo/${{ matrix.arch }}"/*.rpm >/dev/null 2>&1; then
            echo "has_artifacts=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_artifacts=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload bootstrap artifact
        if: steps.build.outputs.has_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.arch }}
          path: repo/${{ matrix.arch }}/
          retention-days: 7

  reindex-repo:
    name: Reindex package repository
    runs-on: ubuntu-latest
    needs: build-bootstrap
    if: |
      always() &&
      needs.build-bootstrap.result == 'success' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild repository index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHP_VERSION: ${{ env.PHP_VERSION }}
          REPO_BASEURL: ${{ env.REPO_BASEURL }}
          PUBLISH_BRANCH: ${{ env.PUBLISH_BRANCH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/*.sh
          scripts/ci-reindex-repo.sh
