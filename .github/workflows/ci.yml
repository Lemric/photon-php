name: Build Photon Bootstrap

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild all bootstrap packages'
        required: false
        type: boolean
        default: false

concurrency:
  group: build-bootstrap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  bootstrap:
    name: Bootstrap RPM pipeline
    uses: ./.github/workflows/_rpm-ci.yml
    with:
      group: bootstrap
      force_build: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_build && '1' || '0' }}
      publish_rpms: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
      reindex: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
      run_test_install: false
    secrets: inherit
