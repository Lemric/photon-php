name: Build Photon Bootstrap

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-bootstrap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PHOTON_VERSION: '5.0'
  REPO_BASEURL: https://pkgs.photon.lemric.com
  PUBLISH_BRANCH: gh-pages

jobs:
  build-bootstrap:
    name: 'Bootstrap ${{ matrix.arch }} (native)'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and publish bootstrap packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh

          publish_if_main() {
            local stage="$1"
            if [ "${{ github.event_name }}" = push ] \
              && { [ "${{ github.ref }}" = refs/heads/main ] || [ "${{ github.ref }}" = refs/heads/master ]; }; then
              GITHUB_REPOSITORY="${{ github.repository }}" \
              GITHUB_SHA="${{ github.sha }}" \
                scripts/ci-publish-rpms.sh "${{ matrix.arch }}" "repo/${{ matrix.arch }}" "${stage}"
            fi
          }

          for stage in re2c libzip rabbitmq-c; do
            echo "=== Building bootstrap stage: ${stage} ==="
            docker run --privileged --rm \
              --platform ${{ matrix.platform }} \
              -v "${{ github.workspace }}:/build" \
              -w /build \
              -e ARCH="${{ matrix.arch }}" \
              -e OUTPUT_DIR="/build/repo/${{ matrix.arch }}" \
              -e RPMBUILD_DIR="/build/.rpmbuild-${{ matrix.arch }}" \
              -e REPO_BASEURL="${{ env.REPO_BASEURL }}" \
              photon:${{ env.PHOTON_VERSION }} \
              bash -c "scripts/ci-build-bootstrap.sh ${stage}"

            publish_if_main "${stage}"
          done

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.arch }}
          path: repo/${{ matrix.arch }}/
          retention-days: 7
