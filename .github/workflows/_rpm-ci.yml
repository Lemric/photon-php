name: Reusable RPM build pipeline

on:
  workflow_call:
    inputs:
      group:
        description: 'Package group: bootstrap or php'
        required: true
        type: string
      checkout_ref:
        description: 'Git ref to build (defaults to caller SHA)'
        required: false
        type: string
        default: ''
      force_build:
        description: 'Force rebuild all packages in the group'
        required: false
        type: string
        default: '0'
      php_version:
        description: 'PHP version for metadata and PHP builds'
        required: false
        type: string
        default: '8.5.8'
      publish_branch:
        description: 'Branch with published RPMs'
        required: false
        type: string
        default: 'gh-pages'
      publish_rpms:
        description: 'Publish built RPMs to gh-pages'
        required: false
        type: boolean
        default: true
      reindex:
        description: 'Rebuild createrepo metadata after publish'
        required: false
        type: boolean
        default: true
      run_test_install:
        description: 'Run post-publish install smoke test (PHP only)'
        required: false
        type: boolean
        default: false
    secrets:
      RPM_GPG_PRIVATE_KEY:
        required: false
      RPM_GPG_KEY_ID:
        required: false
      RPM_GPG_PASSPHRASE:
        required: false

permissions:
  contents: write
  packages: write

env:
  PHP_VERSION: ${{ inputs.php_version }}
  PHOTON_VERSION: '5.0'
  REPO_BASEURL: https://pkgs.photon.lemric.com
  PUBLISH_BRANCH: ${{ inputs.publish_branch }}
  CI_FORCE_BUILD: ${{ inputs.force_build }}
  RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
  RPM_GPG_KEY_ID: ${{ secrets.RPM_GPG_KEY_ID }}
  RPM_GPG_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}

jobs:
  plan:
    name: Plan changed packages
    runs-on: ubuntu-latest
    outputs:
      has_builds: ${{ steps.plan.outputs.has_builds }}
      wave0: ${{ steps.plan.outputs.wave0 }}
      wave1: ${{ steps.plan.outputs.wave1 }}
      wave2: ${{ steps.plan.outputs.wave2 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Checkout published RPMs
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.publish_branch }}
          path: published
          sparse-checkout: |
            x86_64
            aarch64
            repodata.json
          sparse-checkout-cone-mode: false
        continue-on-error: true

      - name: Compute build matrix
        id: plan
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          chmod +x scripts/ci-plan-matrix.py

          python3 scripts/ci-plan-matrix.py "${{ inputs.group }}" published | tee plan.json

          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          from pathlib import Path

          data = json.loads(Path("plan.json").read_text(encoding="utf-8"))
          print(f"has_builds={'true' if data['has_builds'] else 'false'}")
          for wave_id in (0, 1, 2):
              print(f"wave{wave_id}<<EOF")
              print(json.dumps(data[f"wave{wave_id}"]))
              print("EOF")
          PY

          python3 - <<'PY'
          import json
          with open("plan.json", encoding="utf-8") as fh:
              data = json.load(fh)
          if not data["has_builds"]:
              print("No packages need rebuilding — versions already published")
          else:
              for wave_id in (0, 1, 2):
                  items = data[f"wave{wave_id}"]
                  if items:
                      stages = ", ".join(f"{i['arch']}/{i['stage']}" for i in items)
                      print(f"Wave {wave_id}: {stages}")
          PY

  prepare-build-env:
    name: Prepare RPM build environment (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: plan
    if: needs.plan.outputs.has_builds == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Configure builder image name
        run: |
          chmod +x scripts/ci-builder-image-ref.sh
          echo "BUILDER_IMAGE=$(scripts/ci-builder-image-ref.sh ${{ matrix.arch }})" >> "${GITHUB_ENV}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build or reuse Photon RPM builder image
        env:
          CI_FORCE_BUILDER_REBUILD: ${{ inputs.force_build }}
        run: |
          chmod +x scripts/ci-*.sh
          scripts/ci-prepare-builder-image.sh "${{ matrix.arch }}" "${{ matrix.platform }}"

  build-wave-0:
    name: '${{ matrix.stage }} (${{ matrix.arch }})'
    runs-on: ${{ matrix.runner }}
    needs: [plan, prepare-build-env]
    if: needs.plan.outputs.has_builds == 'true' && needs.plan.outputs.wave0 != '[]'
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.wave0) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Checkout published RPMs
        if: matrix.group == 'php'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.publish_branch }}
          path: published
          sparse-checkout: |
            x86_64
            aarch64
            repodata.json
          sparse-checkout-cone-mode: false

      - name: Configure artifact name slug
        run: echo "STAGE_SLUG=${STAGE//:/-}" >> "${GITHUB_ENV}"
        env:
          STAGE: ${{ matrix.stage }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        continue-on-error: ${{ matrix.stage == 'extension:imagick' }}
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh scripts/ci-builder-image-ref.sh
          BUILDER_IMAGE="$(scripts/ci-builder-image-ref.sh "${{ matrix.arch }}")"
          docker pull "${BUILDER_IMAGE}"
          scripts/ci-run-package-build.sh "${{ matrix.group }}" "${{ matrix.arch }}" "${{ matrix.stage }}" "${{ matrix.platform }}" "${BUILDER_IMAGE}"

      - name: Upload RPM artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rpms-w0-${{ matrix.arch }}-${{ env.STAGE_SLUG }}
          path: repo/${{ matrix.arch }}/*.rpm
          if-no-files-found: error
          retention-days: 7

  publish-wave-0:
    name: Publish wave 0 (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [plan, build-wave-0]
    concurrency:
      group: gh-pages-publish-${{ github.repository }}
      cancel-in-progress: false
    if: |
      always() &&
      inputs.publish_rpms &&
      needs.plan.outputs.has_builds == 'true' &&
      needs.plan.outputs.wave0 != '[]' &&
      needs.build-wave-0.result != 'cancelled'
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Download wave 0 artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: rpms-w0-${{ matrix.arch }}-*
          path: artifacts
          merge-multiple: true

      - name: Publish RPMs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHP_VERSION: ${{ env.PHP_VERSION }}
          REPO_BASEURL: ${{ env.REPO_BASEURL }}
          PUBLISH_BRANCH: ${{ env.PUBLISH_BRANCH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ inputs.checkout_ref || github.sha }}
        run: |
          chmod +x scripts/*.sh
          scripts/ci-publish-artifacts.sh "${{ matrix.arch }}" "wave-0" artifacts

  build-wave-1:
    name: '${{ matrix.stage }} (${{ matrix.arch }})'
    runs-on: ${{ matrix.runner }}
    needs: [plan, prepare-build-env, publish-wave-0]
    if: |
      always() &&
      needs.plan.outputs.has_builds == 'true' &&
      needs.plan.outputs.wave1 != '[]' &&
      (needs.publish-wave-0.result == 'success' || needs.publish-wave-0.result == 'skipped')
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.wave1) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Checkout published RPMs
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.publish_branch }}
          path: published
          sparse-checkout: |
            x86_64
            aarch64
            repodata.json
          sparse-checkout-cone-mode: false
        continue-on-error: true

      - name: Download wave 0 RPM dependencies
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: rpms-w0-${{ matrix.arch }}-*
          path: wave-deps
          merge-multiple: true

      - name: Seed dependency RPMs from wave 0
        run: |
          mkdir -p "published/${{ matrix.arch }}" "repo/${{ matrix.arch }}"
          if [ -d wave-deps ]; then
            find wave-deps -type f -name '*.rpm' -exec cp -f {} "published/${{ matrix.arch }}/" \;
            find wave-deps -type f -name '*.rpm' -exec cp -f {} "repo/${{ matrix.arch }}/" \;
          fi

      - name: Configure artifact name slug
        run: echo "STAGE_SLUG=${STAGE//:/-}" >> "${GITHUB_ENV}"
        env:
          STAGE: ${{ matrix.stage }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        continue-on-error: ${{ matrix.stage == 'extension:imagick' }}
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh scripts/ci-builder-image-ref.sh
          BUILDER_IMAGE="$(scripts/ci-builder-image-ref.sh "${{ matrix.arch }}")"
          docker pull "${BUILDER_IMAGE}"
          scripts/ci-run-package-build.sh "${{ matrix.group }}" "${{ matrix.arch }}" "${{ matrix.stage }}" "${{ matrix.platform }}" "${BUILDER_IMAGE}"

      - name: Upload RPM artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rpms-w1-${{ matrix.arch }}-${{ env.STAGE_SLUG }}
          path: repo/${{ matrix.arch }}/*.rpm
          if-no-files-found: error
          retention-days: 7

  publish-wave-1:
    name: Publish wave 1 (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [plan, build-wave-1]
    concurrency:
      group: gh-pages-publish-${{ github.repository }}
      cancel-in-progress: false
    if: |
      always() &&
      inputs.publish_rpms &&
      needs.plan.outputs.has_builds == 'true' &&
      needs.plan.outputs.wave1 != '[]' &&
      needs.build-wave-1.result != 'cancelled'
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Download wave 1 artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: rpms-w1-${{ matrix.arch }}-*
          path: artifacts
          merge-multiple: true

      - name: Publish RPMs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHP_VERSION: ${{ env.PHP_VERSION }}
          REPO_BASEURL: ${{ env.REPO_BASEURL }}
          PUBLISH_BRANCH: ${{ env.PUBLISH_BRANCH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ inputs.checkout_ref || github.sha }}
        run: |
          chmod +x scripts/*.sh
          scripts/ci-publish-artifacts.sh "${{ matrix.arch }}" "wave-1" artifacts

  build-wave-2:
    name: '${{ matrix.stage }} (${{ matrix.arch }})'
    runs-on: ${{ matrix.runner }}
    needs: [plan, prepare-build-env, publish-wave-1]
    if: |
      always() &&
      needs.plan.outputs.has_builds == 'true' &&
      needs.plan.outputs.wave2 != '[]' &&
      (needs.publish-wave-1.result == 'success' || needs.publish-wave-1.result == 'skipped')
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.wave2) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Checkout published RPMs
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.publish_branch }}
          path: published
          sparse-checkout: |
            x86_64
            aarch64
            repodata.json
          sparse-checkout-cone-mode: false

      - name: Download wave 1 RPM dependencies
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: rpms-w1-${{ matrix.arch }}-*
          path: wave-deps
          merge-multiple: true

      - name: Seed dependency RPMs from wave 1
        run: |
          mkdir -p "published/${{ matrix.arch }}" "repo/${{ matrix.arch }}"
          if [ -d wave-deps ]; then
            find wave-deps -type f -name '*.rpm' -exec cp -f {} "published/${{ matrix.arch }}/" \;
            find wave-deps -type f -name '*.rpm' -exec cp -f {} "repo/${{ matrix.arch }}/" \;
          fi

      - name: Configure artifact name slug
        run: echo "STAGE_SLUG=${STAGE//:/-}" >> "${GITHUB_ENV}"
        env:
          STAGE: ${{ matrix.stage }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh scripts/ci-builder-image-ref.sh
          BUILDER_IMAGE="$(scripts/ci-builder-image-ref.sh "${{ matrix.arch }}")"
          docker pull "${BUILDER_IMAGE}"
          scripts/ci-run-package-build.sh "${{ matrix.group }}" "${{ matrix.arch }}" "${{ matrix.stage }}" "${{ matrix.platform }}" "${BUILDER_IMAGE}"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpms-w2-${{ matrix.arch }}-${{ env.STAGE_SLUG }}
          path: repo/${{ matrix.arch }}/*.rpm
          if-no-files-found: error
          retention-days: 7

  publish-wave-2:
    name: Publish wave 2 (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [plan, build-wave-2]
    concurrency:
      group: gh-pages-publish-${{ github.repository }}
      cancel-in-progress: false
    if: |
      always() &&
      inputs.publish_rpms &&
      needs.plan.outputs.has_builds == 'true' &&
      needs.plan.outputs.wave2 != '[]' &&
      needs.build-wave-2.result != 'cancelled'
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Download wave 2 artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: rpms-w2-${{ matrix.arch }}-*
          path: artifacts
          merge-multiple: true

      - name: Publish RPMs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHP_VERSION: ${{ env.PHP_VERSION }}
          REPO_BASEURL: ${{ env.REPO_BASEURL }}
          PUBLISH_BRANCH: ${{ env.PUBLISH_BRANCH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ inputs.checkout_ref || github.sha }}
        run: |
          chmod +x scripts/*.sh
          scripts/ci-publish-artifacts.sh "${{ matrix.arch }}" "wave-2" artifacts

  reindex-repo:
    name: Reindex package repository
    runs-on: ubuntu-latest
    needs: [plan, publish-wave-0, publish-wave-1, publish-wave-2]
    if: |
      always() &&
      inputs.reindex &&
      inputs.publish_rpms &&
      needs.plan.outputs.has_builds == 'true' &&
      (needs.publish-wave-0.result == 'success' || needs.publish-wave-0.result == 'skipped') &&
      (needs.publish-wave-1.result == 'success' || needs.publish-wave-1.result == 'skipped') &&
      (needs.publish-wave-2.result == 'success' || needs.publish-wave-2.result == 'skipped') &&
      (needs.publish-wave-0.result == 'success' || needs.publish-wave-1.result == 'success' || needs.publish-wave-2.result == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Rebuild repository index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHP_VERSION: ${{ env.PHP_VERSION }}
          REPO_BASEURL: ${{ env.REPO_BASEURL }}
          PUBLISH_BRANCH: ${{ env.PUBLISH_BRANCH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ inputs.checkout_ref || github.sha }}
        run: |
          chmod +x scripts/*.sh
          scripts/ci-reindex-repo.sh

  test-install:
    name: Test install (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [plan, reindex-repo]
    if: |
      inputs.run_test_install &&
      needs.plan.outputs.has_builds == 'true' &&
      needs.reindex-repo.result == 'success'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Checkout published RPMs
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.publish_branch }}
          path: published
          sparse-checkout: |
            ${{ matrix.arch }}
            RPM-GPG-KEY-photon-php
          sparse-checkout-cone-mode: false

      - name: Test installation and functionality
        env:
          PHOTON_VERSION: ${{ env.PHOTON_VERSION }}
        run: |
          if ! ls "published/${{ matrix.arch }}"/php85-8*.rpm >/dev/null 2>&1; then
            echo "PHP packages not published yet for ${{ matrix.arch }} — skipping"
            exit 0
          fi
          if [ ! -f published/RPM-GPG-KEY-photon-php ]; then
            echo "ERROR: RPM-GPG-KEY-photon-php missing on gh-pages — run reindex after configuring GPG secrets" >&2
            exit 1
          fi

          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}/published/${{ matrix.arch }}:/repo:ro" \
            -v "${{ github.workspace }}/published/RPM-GPG-KEY-photon-php:/etc/pki/rpm-gpg/RPM-GPG-KEY-photon-php:ro" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              set -euo pipefail

              tdnf install -y rpm shadow
              rpm --import /etc/pki/rpm-gpg/RPM-GPG-KEY-photon-php

              pick_latest() { ls -1 /repo/\$1 2>/dev/null | sort -V | tail -1; }

              tdnf install -y /repo/libzip-[0-9]*.rpm /repo/rabbitmq-c-[0-9]*.rpm \
                /repo/php85-common-*.rpm /repo/php85-cli-*.rpm /repo/php85-fpm-*.rpm \
                /repo/php85-opcache-*.rpm /repo/php85-mbstring-*.rpm /repo/php85-intl-*.rpm \
                /repo/php85-xml-*.rpm /repo/php85-curl-*.rpm /repo/php85-gd-*.rpm \
                /repo/php85-zip-*.rpm /repo/php85-bcmath-*.rpm /repo/php85-mysqlnd-*.rpm \
                /repo/php85-pgsql-*.rpm /repo/php85-8*.rpm \
                \"\$(pick_latest 'php85-pecl-redis-*.rpm')\" \
                \"\$(pick_latest 'php85-pecl-igbinary-*.rpm')\"

              php -v | grep -E 'PHP 8\.5\.[0-9]+'
              php -m | grep -Ei '^(Zend OPcache|mbstring|intl|curl|gd|zip|bcmath|sodium|dom|xml|mysqli|pdo_mysql|pgsql|pdo_pgsql|redis|igbinary)$'
              php -r 'exit(defined("PASSWORD_ARGON2ID") ? 0 : 1);'
              php-fpm -t
              id php-fpm
              echo 'All tests passed'
            "
