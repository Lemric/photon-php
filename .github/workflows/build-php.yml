name: Build PHP 8.5 RPMs

on:
  workflow_run:
    workflows: ['Build Photon Bootstrap']
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version to build'
        required: false
        default: '8.5.8'
      publish_branch:
        description: 'Branch with published bootstrap RPMs'
        required: false
        default: 'gh-pages'
      force_build:
        description: 'Force rebuild all PHP packages and extensions'
        required: false
        type: boolean
        default: false

concurrency:
  group: build-php-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  gate:
    name: Verify upstream workflow
    runs-on: ubuntu-latest
    steps:
      - name: Require upstream success
        run: |
          if [ "${{ github.event_name }}" != "workflow_run" ]; then
            echo "Manual run — proceeding"
            exit 0
          fi
          conclusion="${{ github.event.workflow_run.conclusion }}"
          echo "Upstream: ${{ github.event.workflow_run.name }} (${conclusion})"
          if [ "${conclusion}" != "success" ]; then
            echo "Upstream workflow did not succeed — aborting"
            exit 1
          fi
          upstream_event="${{ github.event.workflow_run.event }}"
          case "${upstream_event}" in
            push|workflow_run|workflow_dispatch)
              echo "Upstream event: ${upstream_event} — proceeding"
              ;;
            *)
              echo "Unexpected upstream event '${upstream_event}' — aborting"
              exit 1
              ;;
          esac

  php:
    name: PHP RPM pipeline
    needs: gate
    uses: ./.github/workflows/_rpm-ci.yml
    with:
      group: php
      checkout_ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      php_version: ${{ github.event.inputs.php_version || '8.5.8' }}
      publish_branch: ${{ github.event.inputs.publish_branch || 'gh-pages' }}
      force_build: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_build && '1' || '0' }}
      publish_rpms: true
      reindex: true
      run_test_install: true
    secrets: inherit
