name: Release PHP RPMs

on:
  push:
    tags:
      - 'php-8.5.*'
      - 'php-*'

permissions:
  contents: write

env:
  PHOTON_VERSION: '5.0'

jobs:
  build-and-release:
    name: Build and release (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract PHP version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PHP_VER="${TAG#php-}"
          echo "php_version=${PHP_VER}" >> "${GITHUB_OUTPUT}"
          echo "Building release for PHP ${PHP_VER}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all RPMs
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e PHP_VERSION="${{ steps.version.outputs.php_version }}" \
            -e ARCH="${{ matrix.arch }}" \
            -e OUTPUT_DIR="/build/repo/${{ matrix.arch }}" \
            -e RPMBUILD_DIR="/build/.rpmbuild-${{ matrix.arch }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              chmod +x scripts/*.sh && \
              scripts/install-build-deps.sh && \
              scripts/build-rpm.sh all && \
              tdnf install -y createrepo_c && \
              ARCH=${{ matrix.arch }} scripts/build-repo.sh
            "

      - name: Package repository tarball
        run: |
          cd repo
          tar -czf "../php85-photon-repo-${{ steps.version.outputs.php_version }}-${{ matrix.arch }}.tar.gz" \
            "${{ matrix.arch }}/"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: |
            repo/${{ matrix.arch }}/
            php85-photon-repo-${{ steps.version.outputs.php_version }}-${{ matrix.arch }}.tar.gz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract PHP version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PHP_VER="${TAG#php-}"
          echo "php_version=${PHP_VER}" >> "${GITHUB_OUTPUT}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PHP ${{ steps.version.outputs.php_version }} for Photon OS
          body: |
            ## PHP ${{ steps.version.outputs.php_version }} RPM Repository for VMware Photon OS 5.x

            ### Packages
            - **php85** — PHP 8.5 core with CLI, FPM, OPcache
            - **php85-*** — Standard extensions (mbstring, intl, gd, curl, zip, mysqlnd, pgsql, ...)
            - **php85-pecl-*** — PECL extensions (redis, igbinary, apcu, amqp, imagick, xdebug)

            ### Architectures
            - x86_64
            - aarch64

            ### Installation

            **GitHub Pages (recommended):**

            ```bash
            ARCH=$(uname -m)
            curl -fsSL https://pkgs.photon.lemric.com/photon-php.repo \
              | sed "s|/x86_64|/${ARCH}|g" \
              > /etc/yum.repos.d/photon-php.repo
            tdnf makecache
            tdnf install php85 php85-fpm php85-opcache
            ```

            **Offline tarball:**

            ```bash
            tar -xzf php85-photon-repo-${{ steps.version.outputs.php_version }}-x86_64.tar.gz -C /opt/
            # baseurl=file:///opt/x86_64
            ```

            See [README](https://github.com/${{ github.repository }}) for full documentation.
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.rpm
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
