name: Build Docker Images

on:
  push:
    branches: [main, master]
    paths:
      - 'docker/8.5/photon/**'
      - '.github/workflows/build-docker.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'docker/8.5/photon/**'
  workflow_dispatch:

env:
  PHOTON_VERSION: '5.0'

jobs:
  build:
    name: PHP ${{ matrix.variant }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cli
            dockerfile: cli/Dockerfile
            platform: linux/amd64
            arch: x86_64
          - variant: fpm
            dockerfile: fpm/Dockerfile
            platform: linux/amd64
            arch: x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and smoke-test image
        run: |
          docker build \
            --platform ${{ matrix.platform }} \
            -f docker/8.5/photon/${{ matrix.dockerfile }} \
            -t php:8.5.8-${{ matrix.variant }}-photon-${{ matrix.arch }} \
            docker/8.5/photon
          docker run --rm --platform ${{ matrix.platform }} \
            php:8.5.8-${{ matrix.variant }}-photon-${{ matrix.arch }} \
            php --version
