name: Docker PHP 8.5 (from published RPMs)

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version tag for the Docker image (empty = read from published repodata.json)'
        required: false
        default: ''
      publish_branch:
        description: 'Branch with published RPM repository'
        required: false
        default: 'gh-pages'
      push_image:
        description: 'Push image to GHCR'
        required: false
        type: boolean
        default: true
  workflow_run:
    workflows: ['Build PHP 8.5 RPMs']
    types: [completed]
    branches: [main, master]

concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  PHOTON_VERSION: '5.0'
  PUBLISH_BRANCH: ${{ github.event.inputs.publish_branch || 'gh-pages' }}
  REPO_BASEURL: https://pkgs.photon.lemric.com

jobs:
  gate:
    name: Verify upstream workflow
    runs-on: ubuntu-latest
    steps:
      - name: Require upstream success
        run: |
          if [ "${{ github.event_name }}" != "workflow_run" ]; then
            echo "Manual run — proceeding"
            exit 0
          fi
          conclusion="${{ github.event.workflow_run.conclusion }}"
          echo "Upstream: ${{ github.event.workflow_run.name }} (${conclusion})"
          if [ "${conclusion}" != "success" ]; then
            echo "Upstream workflow did not succeed — aborting"
            exit 1
          fi
          upstream_event="${{ github.event.workflow_run.event }}"
          case "${upstream_event}" in
            push|workflow_run|workflow_dispatch)
              echo "Upstream event: ${upstream_event} — proceeding"
              ;;
            *)
              echo "Unexpected upstream event '${upstream_event}' — aborting"
              exit 1
              ;;
          esac

  docker-image:
    name: Docker PHP 8.5 (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: gate
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout Dockerfile
        uses: actions/checkout@v4

      - name: Checkout published RPM repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_BRANCH }}
          path: published

      - name: Resolve PHP version and prepare build context
        id: meta
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.php_version }}" ]; then
            PHP_VERSION="${{ github.event.inputs.php_version }}"
          elif [ -f published/repodata.json ]; then
            PHP_VERSION="$(python3 -c "import json; print(json.load(open('published/repodata.json'))['php_version'])")"
          else
            echo "ERROR: cannot determine PHP version — set workflow input or publish repodata.json" >&2
            exit 1
          fi

          echo "php_version=${PHP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Using PHP ${PHP_VERSION} RPMs from branch ${PUBLISH_BRANCH}"

          test -d "published/${{ matrix.arch }}"
          ls "published/${{ matrix.arch }}"/*.rpm >/dev/null

          mkdir -p docker/8.5/photon/rpm/repo
          cp -a "published/${{ matrix.arch }}"/*.rpm docker/8.5/photon/rpm/repo/
          if [ -f published/RPM-GPG-KEY-photon-php ]; then
            cp -a published/RPM-GPG-KEY-photon-php docker/8.5/photon/rpm/RPM-GPG-KEY-photon-php
          elif [ -f pages/RPM-GPG-KEY-photon-php ]; then
            cp -a pages/RPM-GPG-KEY-photon-php docker/8.5/photon/rpm/RPM-GPG-KEY-photon-php
          else
            echo "ERROR: RPM-GPG-KEY-photon-php not found on gh-pages or in pages/" >&2
            exit 1
          fi

      - name: Build images from published RPMs
        env:
          DOCKER_BUILDKIT: '1'
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.php_version }}"
          ARCH="${{ matrix.arch }}"
          CONTEXT="docker/8.5/photon"

          for target in base cli fpm; do
            docker build \
              --platform ${{ matrix.platform }} \
              --build-arg PHOTON_VERSION=${{ env.PHOTON_VERSION }} \
              --target "${target}" \
              -f "${CONTEXT}/rpm/Dockerfile" \
              -t "php:${VERSION}-${target}-photon-${ARCH}" \
              "${CONTEXT}"
          done

      - name: Analyze image sizes
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.php_version }}"
          ARCH="${{ matrix.arch }}"
          chmod +x scripts/docker-image-analyze.sh
          for target in base cli fpm; do
            scripts/docker-image-analyze.sh "php:${VERSION}-${target}-photon-${ARCH}" "docker/image-analysis/${ARCH}"
          done
          echo "## Image sizes (${ARCH})" >> "${GITHUB_STEP_SUMMARY}"
          grep -h '^IMAGE_SIZE=\|^LAYERS=' docker/image-analysis/${ARCH}/*.txt | sort -u >> "${GITHUB_STEP_SUMMARY}" || true

      - name: Smoke-test images
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.php_version }}"
          ARCH="${{ matrix.arch }}"

          docker run --rm --platform ${{ matrix.platform }} \
            "php:${VERSION}-cli-photon-${ARCH}" php -v
          docker run --rm --platform ${{ matrix.platform }} \
            "php:${VERSION}-cli-photon-${ARCH}" php -m

          docker run --rm --platform ${{ matrix.platform }} \
            "php:${VERSION}-fpm-photon-${ARCH}" php-fpm -t

          docker run --rm --platform ${{ matrix.platform }} \
            --user 999:999 \
            "php:${VERSION}-fpm-photon-${ARCH}" php-fpm -t

      - name: Push images to GHCR
        if: |
          (github.event_name == 'workflow_run') ||
          (github.event_name == 'workflow_dispatch' && inputs.push_image)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          VERSION="${{ steps.meta.outputs.php_version }}"
          ARCH="${{ matrix.arch }}"
          OWNER="$(echo 'ghcr.io/${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"

          for target in base cli fpm; do
            IMAGE="${OWNER}/php85-photon-${target}"
            docker tag "php:${VERSION}-${target}-photon-${ARCH}" \
              "${IMAGE}:${VERSION}-${ARCH}"
            docker push "${IMAGE}:${VERSION}-${ARCH}"
          done

          # Backward compatibility: php85-photon without suffix points to FPM.
          LEGACY="${OWNER}/php85-photon"
          docker tag "php:${VERSION}-fpm-photon-${ARCH}" "${LEGACY}:${VERSION}-${ARCH}"
          docker push "${LEGACY}:${VERSION}-${ARCH}"

  docker-manifest:
    name: Multi-arch manifest (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: [gate, docker-image]
    if: |
      needs.docker-image.result == 'success' &&
      ((github.event_name == 'workflow_run') ||
       (github.event_name == 'workflow_dispatch' && inputs.push_image))
    strategy:
      matrix:
        variant: [base, cli, fpm]
    steps:
      - name: Checkout published RPM repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_BRANCH }}
          path: published

      - name: Resolve PHP version
        id: meta
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.php_version }}" ]; then
            PHP_VERSION="${{ github.event.inputs.php_version }}"
          elif [ -f published/repodata.json ]; then
            PHP_VERSION="$(python3 -c "import json; print(json.load(open('published/repodata.json'))['php_version'])")"
          else
            echo "ERROR: cannot determine PHP version" >&2
            exit 1
          fi
          echo "php_version=${PHP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create and push manifest
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          OWNER="$(echo 'ghcr.io/${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          VERSION="${{ steps.meta.outputs.php_version }}"
          VARIANT="${{ matrix.variant }}"
          IMAGE="${OWNER}/php85-photon-${VARIANT}"

          docker manifest create "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-x86_64" \
            "${IMAGE}:${VERSION}-aarch64"
          docker manifest push "${IMAGE}:${VERSION}"

          docker manifest create "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-x86_64" \
            "${IMAGE}:${VERSION}-aarch64"
          docker manifest push "${IMAGE}:latest"

  docker-manifest-legacy:
    name: Multi-arch manifest (legacy php85-photon)
    runs-on: ubuntu-latest
    needs: [gate, docker-image]
    if: |
      needs.docker-image.result == 'success' &&
      ((github.event_name == 'workflow_run') ||
       (github.event_name == 'workflow_dispatch' && inputs.push_image))
    steps:
      - name: Checkout published RPM repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_BRANCH }}
          path: published

      - name: Resolve PHP version
        id: meta
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.php_version }}" ]; then
            PHP_VERSION="${{ github.event.inputs.php_version }}"
          elif [ -f published/repodata.json ]; then
            PHP_VERSION="$(python3 -c "import json; print(json.load(open('published/repodata.json'))['php_version'])")"
          else
            echo "ERROR: cannot determine PHP version" >&2
            exit 1
          fi
          echo "php_version=${PHP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create and push legacy manifest
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          IMAGE="$(echo 'ghcr.io/${{ github.repository_owner }}/php85-photon' | tr '[:upper:]' '[:lower:]')"
          VERSION="${{ steps.meta.outputs.php_version }}"

          docker manifest create "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-x86_64" \
            "${IMAGE}:${VERSION}-aarch64"
          docker manifest push "${IMAGE}:${VERSION}"

          docker manifest create "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-x86_64" \
            "${IMAGE}:${VERSION}-aarch64"
          docker manifest push "${IMAGE}:latest"
