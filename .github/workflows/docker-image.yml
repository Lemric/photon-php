name: Docker PHP 8.5 (from published RPMs)

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version tag for the Docker image (empty = read from published repodata.json)'
        required: false
        default: ''
      publish_branch:
        description: 'Branch with published RPM repository'
        required: false
        default: 'gh-pages'
      push_image:
        description: 'Push image to GHCR'
        required: false
        type: boolean
        default: true
  workflow_run:
    workflows: ['Build Photon RPMs']
    types: [completed]
    branches: [main, master]

concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  PHOTON_VERSION: '5.0'
  PUBLISH_BRANCH: ${{ github.event.inputs.publish_branch || 'gh-pages' }}
  REPO_BASEURL: https://pkgs.photon.lemric.com

jobs:
  docker-image:
    name: Docker PHP 8.5 (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout Dockerfile
        uses: actions/checkout@v4

      - name: Checkout published RPM repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_BRANCH }}
          path: published

      - name: Resolve PHP version and prepare build context
        id: meta
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.php_version }}" ]; then
            PHP_VERSION="${{ github.event.inputs.php_version }}"
          elif [ -f published/repodata.json ]; then
            PHP_VERSION="$(python3 -c "import json; print(json.load(open('published/repodata.json'))['php_version'])")"
          else
            echo "ERROR: cannot determine PHP version — set workflow input or publish repodata.json" >&2
            exit 1
          fi

          echo "php_version=${PHP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Using PHP ${PHP_VERSION} RPMs from branch ${PUBLISH_BRANCH}"

          test -d "published/${{ matrix.arch }}"
          ls "published/${{ matrix.arch }}"/*.rpm >/dev/null

          mkdir -p docker/8.5/photon/rpm/repo
          cp -a "published/${{ matrix.arch }}"/*.rpm docker/8.5/photon/rpm/repo/
          cp -a "published/${{ matrix.arch }}/repodata" docker/8.5/photon/rpm/repo/repodata

      - name: Build image from published RPMs
        run: |
          docker build \
            --platform ${{ matrix.platform }} \
            --build-arg PHOTON_VERSION=${{ env.PHOTON_VERSION }} \
            -f docker/8.5/photon/rpm/Dockerfile \
            -t "php:${{ steps.meta.outputs.php_version }}-photon-${{ matrix.arch }}" \
            docker/8.5/photon/rpm

      - name: Smoke-test image
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            "php:${{ steps.meta.outputs.php_version }}-photon-${{ matrix.arch }}" php -v
          docker run --rm --platform ${{ matrix.platform }} \
            "php:${{ steps.meta.outputs.php_version }}-photon-${{ matrix.arch }}" php -m

      - name: Push image to GHCR
        if: |
          (github.event_name == 'workflow_run') ||
          (github.event_name == 'workflow_dispatch' && inputs.push_image)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          IMAGE="ghcr.io/${{ github.repository_owner }}/php85-photon"
          IMAGE="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"
          docker tag "php:${{ steps.meta.outputs.php_version }}-photon-${{ matrix.arch }}" \
            "$IMAGE:${{ steps.meta.outputs.php_version }}-${{ matrix.arch }}"
          docker push "$IMAGE:${{ steps.meta.outputs.php_version }}-${{ matrix.arch }}"

  docker-manifest:
    name: Multi-arch manifest
    runs-on: ubuntu-latest
    needs: docker-image
    if: |
      (github.event_name == 'workflow_run') ||
      (github.event_name == 'workflow_dispatch' && inputs.push_image)
    steps:
      - name: Checkout published RPM repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_BRANCH }}
          path: published

      - name: Resolve PHP version
        id: meta
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.php_version }}" ]; then
            PHP_VERSION="${{ github.event.inputs.php_version }}"
          elif [ -f published/repodata.json ]; then
            PHP_VERSION="$(python3 -c "import json; print(json.load(open('published/repodata.json'))['php_version'])")"
          else
            echo "ERROR: cannot determine PHP version" >&2
            exit 1
          fi
          echo "php_version=${PHP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create and push manifest
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          IMAGE="ghcr.io/${{ github.repository_owner }}/php85-photon"
          IMAGE="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"
          VERSION="${{ steps.meta.outputs.php_version }}"
          docker manifest create "$IMAGE:${VERSION}" \
            "$IMAGE:${VERSION}-x86_64" \
            "$IMAGE:${VERSION}-aarch64"
          docker manifest push "$IMAGE:${VERSION}"
          docker manifest create "$IMAGE:latest" \
            "$IMAGE:${VERSION}-x86_64" \
            "$IMAGE:${VERSION}-aarch64"
          docker manifest push "$IMAGE:latest"
