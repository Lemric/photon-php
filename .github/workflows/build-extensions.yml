name: Build PECL Extensions

on:
  push:
    branches: [main, master]
    paths:
      - 'extensions/**'
      - 'packaging/**'
      - 'scripts/**'
      - '.github/workflows/build-extensions.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'extensions/**'
  workflow_dispatch:

env:
  PHP_VERSION: '8.5.8'
  PHOTON_VERSION: '5.0'

jobs:
  build-extensions:
    name: Build PECL RPMs (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: []
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build PHP and extensions
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e PHP_VERSION="${{ env.PHP_VERSION }}" \
            -e ARCH="${{ matrix.arch }}" \
            -e OUTPUT_DIR="/build/repo/${{ matrix.arch }}" \
            -e RPMBUILD_DIR="/build/.rpmbuild-${{ matrix.arch }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              chmod +x scripts/*.sh && \
              scripts/install-build-deps.sh && \
              scripts/build-rpm.sh all
            "

      - name: Create repository metadata
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e ARCH="${{ matrix.arch }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              tdnf install -y createrepo_c && \
              ARCH=${{ matrix.arch }} scripts/build-repo.sh
            "

      - name: Upload extension RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: php85-extensions-${{ matrix.arch }}
          path: |
            repo/${{ matrix.arch }}/php85-pecl-*.rpm
            repo/${{ matrix.arch }}/repodata/
          retention-days: 30
