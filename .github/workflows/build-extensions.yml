# Deprecated — use .github/workflows/ci.yml instead.
# Kept for manual runs only.

name: Build PECL Extensions (manual)

on:
  workflow_dispatch:

env:
  PHP_VERSION: '8.5.8'
  PHOTON_VERSION: '5.0'

jobs:
  build-extensions:
    name: Build PECL RPMs (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build PHP and extensions
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e PHP_VERSION="${{ env.PHP_VERSION }}" \
            -e ARCH="${{ matrix.arch }}" \
            -e OUTPUT_DIR="/build/repo/${{ matrix.arch }}" \
            -e RPMBUILD_DIR="/build/.rpmbuild-${{ matrix.arch }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              chmod +x scripts/*.sh && \
              scripts/install-build-deps.sh && \
              scripts/build-rpm.sh all
            "
