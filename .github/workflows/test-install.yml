# Deprecated — install tests run from ci.yml after build-rpms completes.
# Kept for manual runs only.

name: Test RPM Installation (manual)

on:
  workflow_dispatch:

env:
  PHP_VERSION: '8.5.8'
  PHOTON_VERSION: '5.0'

jobs:
  build-and-test:
    name: Build, install and test (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3

      - name: Build RPMs
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            -e PHP_VERSION="${{ env.PHP_VERSION }}" \
            -e ARCH="${{ matrix.arch }}" \
            -e OUTPUT_DIR="/build/repo/${{ matrix.arch }}" \
            -e RPMBUILD_DIR="/build/.rpmbuild-${{ matrix.arch }}" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              chmod +x scripts/*.sh && \
              scripts/install-build-deps.sh && \
              scripts/build-rpm.sh all && \
              tdnf install -y createrepo_c && \
              ARCH=${{ matrix.arch }} scripts/build-repo.sh
            "

      - name: Test installation and functionality
        run: |
          docker run --privileged --rm \
            --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}/repo/${{ matrix.arch }}:/repo:ro" \
            photon:${{ env.PHOTON_VERSION }} \
            bash -c "
              set -euo pipefail
              cat > /etc/yum.repos.d/photon-php.repo << 'EOF'
              [photon-php]
              name=Photon PHP 8.5
              baseurl=file:///repo
              enabled=1
              gpgcheck=0
              EOF
              tdnf makecache
              tdnf install -y php85 php85-cli php85-fpm php85-common php85-opcache
              php -v
            "
