services:
  php-fpm:
    image: ghcr.io/lemric/php85-photon-fpm:latest
    restart: unless-stopped
    volumes:
      - ./html:/var/www/html:ro

  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./html:/var/www/html:ro
    depends_on:
      - php-fpm
